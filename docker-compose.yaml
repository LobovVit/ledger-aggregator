name: svap-query-service

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: svap_query_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d svap_query_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=svap_query_service
      - DB_SCHEMA=svap_query_service
      - SVAP_FSG_HOST=${SVAP_FSG_HOST:-http://fk-eb-svap-dev-fb-svip-datamart.otr.ru:8081}
      - SVAP_FSG_SUFFIX=${SVAP_FSG_SUFFIX:-/fah_main}
      - SVAP_TURN_HOST=${SVAP_TURN_HOST:-http://fk-eb-svap-dev-fb-svip-datamart.otr.ru:8081}
      - SVAP_TURN_SUFFIX=${SVAP_TURN_SUFFIX:-/fah_main}
      - SVAP_COR_HOST=${SVAP_COR_HOST:-http://fk-eb-svap-dev-fb-svip-datamart.otr.ru:8081}
      - SVAP_COR_SUFFIX=${SVAP_COR_SUFFIX:-/fah_main}
      - SVAP_PA_HOST=${SVAP_PA_HOST:-http://fk-eb-svap-dev-fb-svip-datamart.otr.ru:8081}
      - SVAP_PA_SUFFIX=${SVAP_PA_SUFFIX:-/fah_main}
      - SVAP_CONS_HOST=${SVAP_CONS_HOST:-http://fk-eb-svap-dev-fb-svip-datamart.otr.ru:8081}
      - SVAP_CONS_SUFFIX=${SVAP_CONS_SUFFIX:-/fah_main}
      - SVAP_INSECURE_SKIP_VERIFY=${SVAP_INSECURE_SKIP_VERIFY:-false}
      - SVAP_TIMEOUT_SECONDS=${SVAP_TIMEOUT_SECONDS:-180}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
