services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger_aggregator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=ledger_aggregator
      - SVAP_HOST_GK=${SVAP_HOST_GK:-http://svap-gk:8080}
      - SVAP_HOST_LS=${SVAP_HOST_LS:-http://svap-ls:8080}
      - SVAP_HOST_JO=${SVAP_HOST_JO:-http://svap-jo:8080}
    depends_on:
      - postgres

volumes:
  postgres_data:
