basePath: /api/v1
definitions:
  api.ErrorResponse:
    properties:
      message:
        example: saved query with id ... was not found
        type: string
    type: object
  api.ExecuteQueryAcceptedResponse:
    properties:
      execution:
        $ref: '#/definitions/model.QueryExecution'
      execution_id:
        type: string
      message:
        type: string
      query_id:
        type: string
      status:
        type: string
    type: object
  api.ExecuteQueryRequest:
    properties:
      async:
        type: boolean
      description:
        type: string
      end_rep_date:
        type: string
      limit:
        type: integer
      name:
        type: string
      offset:
        type: integer
      org_code:
        type: string
      query_id:
        type: string
      roles:
        items:
          type: string
        type: array
      start_rep_date:
        type: string
      visibility:
        type: string
    type: object
  api.ExecuteQuerySyncResponse:
    properties:
      execution:
        $ref: '#/definitions/model.QueryExecution'
      query_id:
        type: string
      result:
        $ref: '#/definitions/model.QueryResult'
      status:
        type: string
    type: object
  config.AppConfig:
    properties:
      retention:
        $ref: '#/definitions/config.RetentionConfig'
      server:
        $ref: '#/definitions/config.ServerConfig'
      svap:
        $ref: '#/definitions/config.SVAPConfig'
    type: object
  config.RetentionConfig:
    properties:
      default_ttl:
        description: Например, "24h"
        type: string
      org_ttls:
        additionalProperties:
          type: string
        description: 'Напр. {"9500": "288h"}'
        type: object
      role_ttls:
        additionalProperties:
          type: string
        description: 'Напр. {"admin": "72h"}'
        type: object
      user_ttls:
        additionalProperties:
          type: string
        description: 'Напр. {"lobov.vit": "144h"}'
        type: object
    type: object
  config.SVAPConfig:
    properties:
      endpoints:
        additionalProperties:
          $ref: '#/definitions/config.SVAPEndpoint'
        description: Ключ - тип запроса (FSG, TURN, PA, CONS и т.д.)
        type: object
    type: object
  config.SVAPEndpoint:
    properties:
      host:
        type: string
      suffix:
        type: string
    type: object
  config.ServerConfig:
    properties:
      port:
        type: string
    type: object
  model.AnalyticalAttribute:
    properties:
      businesses:
        description: Перечень СВАПОВ (бизнесов), напр. ["ФБ", "ПУД"]
        items:
          type: string
        type: array
      code:
        description: Код ан признака СВАП (напр. BUD_CODE)
        type: string
      in_account:
        description: Тип признака (в составе счета / не в составе)
        type: boolean
      last_updated:
        type: string
      name:
        description: Наименование ан признака
        type: string
      use_in_balance:
        description: Признак участия в расчете балансов
        type: boolean
      validation_type:
        description: Тип валидации (Service/RegExpression/List)
        type: string
      validation_value:
        description: Значение для валидации (адрес сервиса/регэксп/JSON списка)
        type: string
    type: object
  model.DictionaryItem:
    properties:
      analytical_attribute_code:
        type: string
      business:
        type: string
      code:
        type: string
      dictionary_code:
        type: string
      full_name:
        type: string
      last_updated:
        type: string
      short_name:
        type: string
    type: object
  model.QueryExecution:
    properties:
      created_at:
        type: string
      end_rep_date:
        type: string
      error_message:
        type: string
      finished_at:
        type: string
      id:
        type: string
      limit:
        type: integer
      mode:
        type: string
      offset:
        type: integer
      query_id:
        type: string
      result_id:
        type: string
      start_rep_date:
        type: string
      started_at:
        type: string
      status:
        type: string
      user_id:
        type: string
    type: object
  model.QueryResult:
    properties:
      description:
        type: string
      expires_at:
        type: string
      fetched_at:
        type: string
      id:
        type: string
      meta:
        description: Метаинформация для АИ
      name:
        type: string
      query_id:
        type: string
      visibility:
        type: string
    type: object
  model.SavedQuery:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      params:
        description: JSON-строка параметров
        type: string
      query_type:
        description: OPLIST, FSG, TURN, ReportGK, COR, PA, CONS
        type: string
      user_id:
        type: string
      visibility:
        description: private, organization, public
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 'RU: API сервиса SVAP Query Service для интеграции со СВАП, управления
    сохраненными запросами, результатами и динамической конфигурацией. EN: API server
    for SVAP Query Service, used to integrate with SVAP and manage saved queries,
    query results, and dynamic configuration.'
  title: API SVAP Query Service / API агрегатора витрин
  version: "1.0"
paths:
  /analytical-attributes:
    get:
      description: 'RU: Возвращает справочник аналитических признаков, опционально
        с фильтром по бизнесу. EN: Returns analytical attributes, optionally filtered
        by business.'
      parameters:
      - description: 'RU: Код бизнеса / EN: Business code'
        in: query
        name: business
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Список аналитических признаков / EN: Analytical attribute
            list'
          schema:
            items:
              $ref: '#/definitions/model.AnalyticalAttribute'
            type: array
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Получить аналитические признаки / EN: List analytical attributes'
      tags:
      - dictionaries
  /config:
    get:
      description: 'RU: Возвращает всю подготовленную конфигурацию, включая еще не
        примененные изменения. EN: Returns the full pending configuration, including
        unapplied changes.'
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Подготовленная конфигурация / EN: Pending configuration'
          schema:
            $ref: '#/definitions/config.AppConfig'
      summary: 'RU: Получить текущую подготовленную конфигурацию / EN: Get current
        pending configuration'
      tags:
      - config
    put:
      consumes:
      - application/json
      description: 'RU: Частично или полностью обновляет подготовленную конфигурацию
        из JSON-тела без немедленного применения. EN: Partially or fully updates the
        pending configuration from the JSON body without applying it immediately.'
      parameters:
      - description: 'RU: Частичный или полный JSON конфигурации / EN: Partial or
          full configuration JSON'
        in: body
        name: config
        required: true
        schema: {}
      responses:
        "204":
          description: 'RU: Обновлено, тело ответа отсутствует / EN: Updated, no response
            body'
        "400":
          description: 'RU: Некорректное тело запроса / EN: Invalid request body'
          schema:
            type: string
      summary: 'RU: Обновить подготовленную конфигурацию / EN: Update pending configuration'
      tags:
      - config
  /config/apply:
    post:
      description: 'RU: Сохраняет подготовленную конфигурацию в БД и отправляет уведомление
        узлам через PostgreSQL NOTIFY. EN: Persists the pending configuration to the
        database and notifies nodes through PostgreSQL NOTIFY.'
      responses:
        "200":
          description: 'RU: Конфигурация применена / EN: Configuration applied'
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Применить подготовленную конфигурацию / EN: Apply pending configuration'
      tags:
      - config
  /config/groups:
    get:
      description: 'RU: Возвращает имена доступных групп конфигурации. EN: Returns
        names of available configuration groups.'
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Группы конфигурации / EN: Configuration groups'
          schema:
            items:
              type: string
            type: array
      summary: 'RU: Получить группы конфигурации / EN: List configuration groups'
      tags:
      - config
  /config/groups/{name}:
    get:
      description: 'RU: Возвращает настройки указанной группы: server, svap или retention.
        EN: Returns settings for the specified group: server, svap, or retention.'
      parameters:
      - description: 'RU: Имя группы / EN: Group name'
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Настройки группы / EN: Group settings'
          schema: {}
        "404":
          description: 'RU: Группа не найдена / EN: Group not found'
          schema:
            type: string
      summary: 'RU: Получить группу конфигурации / EN: Get a configuration group'
      tags:
      - config
  /dictionaries:
    get:
      description: 'RU: Возвращает элементы справочников с фильтрами по ФП, коду справочника,
        строке поиска по краткому/полному наименованию и связанному аналитическому
        признаку. EN: Returns dictionary items filtered by business, dictionary code,
        short/full name search query, and linked analytical attribute.'
      parameters:
      - description: 'RU: Код функциональной подсистемы / EN: Business code'
        in: query
        name: business
        type: string
      - description: 'RU: Код справочника / EN: Dictionary code'
        in: query
        name: dictionary_code
        type: string
      - description: 'RU: Поиск по краткому или полному наименованию / EN: Search
          by short or full name'
        in: query
        name: q
        type: string
      - description: 'RU: Код связанного аналитического признака / EN: Linked analytical
          attribute code'
        in: query
        name: analytical_attribute_code
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Элементы справочников / EN: Dictionary items'
          schema:
            items:
              $ref: '#/definitions/model.DictionaryItem'
            type: array
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Найти элементы справочников / EN: Search dictionary items'
      tags:
      - dictionaries
    post:
      consumes:
      - application/json
      description: 'RU: Сохраняет элемент справочника. Связь с analytical_attribute_code
        необязательная. EN: Saves a dictionary item. analytical_attribute_code link
        is optional.'
      parameters:
      - description: 'RU: Элемент справочника / EN: Dictionary item'
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/model.DictionaryItem'
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Элемент сохранен / EN: Dictionary item saved'
          schema:
            $ref: '#/definitions/model.DictionaryItem'
        "400":
          description: 'RU: Некорректное тело запроса / EN: Invalid request body'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Создать или обновить элемент справочника / EN: Create or update
        dictionary item'
      tags:
      - dictionaries
  /dictionaries/item:
    delete:
      description: 'RU: Удаляет элемент справочника по составному ключу. EN: Deletes
        a dictionary item by composite key.'
      parameters:
      - description: 'RU: Код функциональной подсистемы / EN: Business code'
        in: query
        name: business
        required: true
        type: string
      - description: 'RU: Код справочника / EN: Dictionary code'
        in: query
        name: dictionary_code
        required: true
        type: string
      - description: 'RU: Код элемента / EN: Item code'
        in: query
        name: item_code
        required: true
        type: string
      responses:
        "204":
          description: 'RU: Удалено / EN: Deleted'
        "400":
          description: 'RU: Не передан обязательный параметр / EN: Required parameter
            is missing'
          schema:
            type: string
        "404":
          description: 'RU: Элемент не найден / EN: Item not found'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Удалить элемент справочника / EN: Delete dictionary item'
      tags:
      - dictionaries
    get:
      description: 'RU: Возвращает один элемент справочника по составному ключу. EN:
        Returns a single dictionary item by composite key.'
      parameters:
      - description: 'RU: Код функциональной подсистемы / EN: Business code'
        in: query
        name: business
        required: true
        type: string
      - description: 'RU: Код справочника / EN: Dictionary code'
        in: query
        name: dictionary_code
        required: true
        type: string
      - description: 'RU: Код элемента / EN: Item code'
        in: query
        name: item_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Элемент справочника / EN: Dictionary item'
          schema:
            $ref: '#/definitions/model.DictionaryItem'
        "400":
          description: 'RU: Не передан обязательный параметр / EN: Required parameter
            is missing'
          schema:
            type: string
        "404":
          description: 'RU: Элемент не найден / EN: Item not found'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Получить элемент справочника / EN: Get dictionary item'
      tags:
      - dictionaries
  /info:
    get:
      description: 'RU: Возвращает имя приложения, версию, Git-метаданные и текущее
        время сервера. EN: Returns application name, version, Git metadata, and current
        server time.'
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Информация о приложении / EN: App info'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 'RU: Получить информацию о приложении / EN: Get application info'
      tags:
      - info
  /queries:
    get:
      description: 'RU: Возвращает список сохраненных запросов пользователя из заголовка
        X-User-ID. EN: Returns saved queries for the user from the X-User-ID header.'
      parameters:
      - description: 'RU: Идентификатор пользователя / EN: User identifier'
        in: header
        name: X-User-ID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Список сохраненных запросов / EN: Saved query list'
          schema:
            items:
              $ref: '#/definitions/model.SavedQuery'
            type: array
        "401":
          description: 'RU: Не передан X-User-ID / EN: X-User-ID is missing'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Получить сохраненные запросы / EN: List saved queries'
      tags:
      - queries
    post:
      consumes:
      - application/json
      description: 'RU: Регистрирует новый шаблон запроса с параметрами фильтрации.
        Пользователь определяется по заголовку X-User-ID. EN: Registers a new query
        template with filter parameters. The user is resolved from the X-User-ID header.'
      parameters:
      - description: 'RU: Идентификатор пользователя / EN: User identifier'
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: 'RU: Описание запроса / EN: Query definition'
        in: body
        name: query
        required: true
        schema:
          $ref: '#/definitions/model.SavedQuery'
      produces:
      - application/json
      responses:
        "201":
          description: 'RU: Запрос создан / EN: Query created'
          schema:
            $ref: '#/definitions/model.SavedQuery'
        "400":
          description: 'RU: Некорректное тело запроса или видимость / EN: Invalid
            request body or visibility'
          schema:
            type: string
        "401":
          description: 'RU: Не передан X-User-ID / EN: X-User-ID is missing'
          schema:
            type: string
        "403":
          description: 'RU: user_id не совпадает с X-User-ID / EN: user_id does not
            match X-User-ID'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Создать сохраненный запрос / EN: Create a saved query'
      tags:
      - queries
  /queries/{id}:
    delete:
      description: 'RU: Удаляет сохраненный запрос и все связанные с ним результаты.
        EN: Deletes a saved query and all related query results.'
      parameters:
      - description: 'RU: Идентификатор пользователя / EN: User identifier'
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: 'RU: UUID запроса / EN: Query UUID'
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: 'RU: Удалено, тело ответа отсутствует / EN: Deleted, no response
            body'
        "400":
          description: 'RU: Некорректный UUID запроса / EN: Invalid query UUID'
          schema:
            type: string
        "401":
          description: 'RU: Не передан X-User-ID / EN: X-User-ID is missing'
          schema:
            type: string
        "403":
          description: 'RU: Запрос принадлежит другому пользователю / EN: Query belongs
            to another user'
          schema:
            type: string
        "404":
          description: 'RU: Запрос не найден / EN: Query not found'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Удалить сохраненный запрос / EN: Delete a saved query'
      tags:
      - queries
    get:
      description: 'RU: Возвращает параметры конкретного сохраненного запроса по UUID.
        EN: Returns details of a saved query by UUID.'
      parameters:
      - description: 'RU: Идентификатор пользователя / EN: User identifier'
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: 'RU: UUID запроса / EN: Query UUID'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Сохраненный запрос / EN: Saved query'
          schema:
            $ref: '#/definitions/model.SavedQuery'
        "400":
          description: 'RU: Некорректный UUID запроса / EN: Invalid query UUID'
          schema:
            type: string
        "401":
          description: 'RU: Не передан X-User-ID / EN: X-User-ID is missing'
          schema:
            type: string
        "403":
          description: 'RU: Запрос принадлежит другому пользователю / EN: Query belongs
            to another user'
          schema:
            type: string
        "404":
          description: 'RU: Запрос не найден / EN: Query not found'
          schema:
            type: string
      summary: 'RU: Получить сохраненный запрос / EN: Get a saved query'
      tags:
      - queries
  /queries/{id}/results:
    get:
      description: 'RU: Возвращает историю выполнений для указанного сохраненного
        запроса. EN: Returns execution history for the specified saved query.'
      parameters:
      - description: 'RU: Идентификатор пользователя / EN: User identifier'
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: 'RU: UUID запроса / EN: Query UUID'
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: История результатов / EN: Query result history'
          schema:
            items:
              $ref: '#/definitions/model.QueryResult'
            type: array
        "400":
          description: 'RU: Некорректный UUID запроса / EN: Invalid query UUID'
          schema:
            type: string
        "401":
          description: 'RU: Не передан X-User-ID / EN: X-User-ID is missing'
          schema:
            type: string
        "403":
          description: 'RU: Запрос принадлежит другому пользователю / EN: Query belongs
            to another user'
          schema:
            type: string
        "404":
          description: 'RU: Запрос не найден / EN: Query not found'
          schema:
            type: string
        "500":
          description: 'RU: Внутренняя ошибка сервера / EN: Internal server error'
          schema:
            type: string
      summary: 'RU: Получить результаты запроса / EN: List query results'
      tags:
      - results
  /query/execute:
    post:
      consumes:
      - application/json
      description: 'RU: Запускает запрос к СВАП по сохраненному шаблону. По умолчанию
        async=true: возвращает задачу со статусом queued, результат появится после
        завершения в /results. При async=false дожидается выполнения и возвращает
        результат. EN: Starts a saved query template execution. By default async=true:
        returns a queued execution job, and the result appears later in /results.
        With async=false waits for completion and returns the result.'
      parameters:
      - description: 'RU: Идентификатор пользователя / EN: User identifier'
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: 'RU: Параметры выполнения / EN: Execution parameters'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.ExecuteQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'RU: Выполнение завершено синхронно / EN: Execution completed
            synchronously'
          schema:
            $ref: '#/definitions/api.ExecuteQuerySyncResponse'
        "202":
          description: 'RU: Выполнение принято / EN: Execution accepted'
          schema:
            $ref: '#/definitions/api.ExecuteQueryAcceptedResponse'
        "400":
          description: 'RU: Некорректное тело запроса / EN: Invalid request body'
