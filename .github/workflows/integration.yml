name: integration

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yaml"
      - ".env.example"
      - ".github/workflows/integration.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yaml"
      - ".env.example"
      - ".github/workflows/integration.yml"

jobs:
  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker compose build
      - run: docker compose up -d postgres backend frontend
      - run: docker compose ps
      - run: docker compose logs --tail=120 backend
      - run: docker compose down -v
        if: always()
