name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - "contracts/openapi/**"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "contracts/openapi/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - run: go test ./...
      - run: go vet ./...
